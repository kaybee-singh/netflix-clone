<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Netflix Demo - Final Build</title>
    <style>
        :root { --netflix-red: #e50914; --netflix-black: #141414; --grey: #808080; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #000; color: white; margin: 0; overflow-x: hidden; }
        
        /* --- 1. Profile Selection Screen --- */
        #profile-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #profile-screen h1 { font-weight: 400; font-size: 3.5rem; margin-bottom: 40px; letter-spacing: 1px; }

        .profile-container { display: flex; gap: 30px; align-items: flex-start; }
        .profile { text-align: center; cursor: pointer; width: 150px; }
        
        .avatar { 
            width: 150px; height: 150px; border-radius: 4px; 
            position: relative; border: 4px solid transparent; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: border 0.3s; margin-bottom: 15px;
        }
        .profile:hover .avatar { border-color: #fff; }
        .profile:hover p { color: #fff; }
        .profile p { color: var(--grey); font-size: 1.2rem; margin: 0; transition: 0.3s; }

        /* Iconic Smiley Face CSS */
        .smiley-eyes { display: flex; gap: 40px; margin-top: 20px; }
        .eye { width: 16px; height: 16px; background: rgba(0,0,0,0.4); border-radius: 50%; }
        .smiley-mouth { width: 70px; height: 35px; border-bottom: 8px solid rgba(0,0,0,0.4); border-radius: 50%; margin-top: 5px; }

        .avatar-blue { background: #1e88e5; }
        .avatar-red { background: #e53935; }
        .avatar-green { background: #43a047; }
        .avatar-kids { background: linear-gradient(45deg, #8e24aa, #1e88e5); }

        .add-profile .avatar { background: none; display: flex; align-items: center; justify-content: center; }
        .plus-icon { font-size: 6rem; color: var(--grey); font-weight: 100; }
        .profile:hover .plus-icon { color: #fff; }

        .manage-btn { 
            margin-top: 80px; padding: 10px 30px; border: 1px solid var(--grey); 
            background: none; color: var(--grey); font-size: 1.1rem; 
            letter-spacing: 2px; cursor: pointer; text-transform: uppercase;
        }
        .manage-btn:hover { border-color: #fff; color: #fff; }

        /* --- 2. Home Screen Styling --- */
        #home-screen { display: none; }
        .navbar { padding: 15px 50px; display: flex; align-items: center; position: fixed; width: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); z-index: 100; box-sizing: border-box; }
        .logo { color: var(--netflix-red); font-size: 28px; font-weight: bold; margin-right: 30px; }
        .nav-links a { color: #e5e5e5; text-decoration: none; margin-right: 18px; font-size: 0.85rem; }

        .hero { 
            height: 80vh; 
            background: linear-gradient(to right, #000 5%, transparent 70%), 
                        linear-gradient(to top, #000 5%, transparent 30%),
                        url('posters/vadh.jpg') no-repeat center center/cover; 
            display: flex; align-items: center; padding: 0 50px; 
        }
        .hero-content h1 { font-size: 5rem; margin: 0; }
        .hero-content p { font-size: 1.2rem; max-width: 600px; }
        .btn { padding: 12px 28px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-right: 12px; font-size: 1.1rem; }

        /* Sliders & Rows */
        .main-view { margin-top: -100px; position: relative; z-index: 10; padding-bottom: 50px; }
        .row { margin: 0 0 35px 0; padding-left: 50px; position: relative; }
        .row h2 { font-size: 1.4rem; color: #e5e5e5; margin-bottom: 12px; }
        
        .slider-container { position: relative; display: flex; align-items: center; }
        .posters-row { display: flex; overflow-x: scroll; padding: 15px 0; scrollbar-width: none; scroll-behavior: smooth; }
        .posters-row::-webkit-scrollbar { display: none; }
        
        .poster { 
            min-width: 280px; width: 280px; height: 157px; 
            object-fit: cover; margin-right: 12px; border-radius: 4px; 
            cursor: pointer; transition: 0.4s ease; 
        }
        .poster:hover { transform: scale(1.08); z-index: 50; }

        .arrow {
            position: absolute; top: 0; bottom: 0; width: 50px;
            background: rgba(0,0,0,0.5); color: white; border: none;
            font-size: 3rem; cursor: pointer; z-index: 60;
            opacity: 0; transition: 0.3s;
        }
        .row:hover .arrow { opacity: 1; }
        .left-arrow { left: 0; margin-left: -50px; }
        .right-arrow { right: 0; }
    </style>
</head>
<body>

    <div id="profile-screen">
        <h1>Who's watching?</h1>
        <div class="profile-container">
            <div class="profile" onclick="showHome('kubearc')">
                <div class="avatar avatar-blue"><div class="smiley-eyes"><div class="eye"></div><div class="eye"></div></div><div class="smiley-mouth"></div></div>
                <p>kubearc</p>
            </div>
            <div class="profile" onclick="showHome('manvir')">
                <div class="avatar avatar-red"><div class="smiley-eyes"><div class="eye"></div><div class="eye"></div></div><div class="smiley-mouth"></div></div>
                <p>manvir</p>
            </div>
            <div class="profile" onclick="showHome('sam')">
                <div class="avatar avatar-green"><div class="smiley-eyes"><div class="eye"></div><div class="eye"></div></div><div class="smiley-mouth"></div></div>
                <p>sam</p>
            </div>
            <div class="profile" onclick="showHome('kids')">
                <div class="avatar avatar-kids"><div style="color:white; font-size:1.6rem; font-weight:bold; margin-top:10px;">children</div></div>
                <p>kids</p>
            </div>
            <div class="profile add-profile">
                <div class="avatar"><div class="plus-icon">+</div></div>
                <p>Add Profile</p>
            </div>
        </div>
        <button class="manage-btn">Manage Profiles</button>
    </div>

    <div id="home-screen">
        <div class="navbar"><div class="logo">NETFLIX</div></div>
        <div class="hero">
            <div class="hero-content">
                <h1>VADH</h1>
                <p>#1 in Movies Today</p>
                <button class="btn" style="background:white; color:black;" onclick="playTrailer('vadh.jpg')">▶ Play</button>
                <button class="btn" style="background:rgba(109,109,110,0.8); color:white;" onclick="playTrailer('vadh.jpg')">ⓘ More Info</button>
            </div>
        </div>

        <div class="main-view">
            <div class="row">
                <h2 id="user-title">Continue Watching</h2>
                <div class="slider-container">
                    <button class="arrow left-arrow" onclick="slide('row1', -1)">&#8249;</button>
                    <div class="posters-row" id="row1"></div>
                    <button class="arrow right-arrow" onclick="slide('row1', 1)">&#8250;</button>
                </div>
            </div>
            <div class="row">
                <h2>Trending Now</h2>
                <div class="slider-container">
                    <button class="arrow left-arrow" onclick="slide('row2', -1)">&#8249;</button>
                    <div class="posters-row" id="row2"></div>
                    <button class="arrow right-arrow" onclick="slide('row2', 1)">&#8250;</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const trailerMap = {
            'bads-of-bollywood.jpeg': 'J-0f7teDD2I',
            'vadh.jpg': 'pyUSsvVdL20',
            'kantara.jpg': '6oKFao0aISA',
            'border2.jpeg': 'AZGfCK1yTTI',
            'dhurandar.jpeg': 'BKOVzHcjEIo',
            'gladiator2.jpeg': '4rgYUipGJNo',
            'gone-girl.jpeg': '2-_-1nJf8Vg',
            'inception.jpeg': 'YoHD9XEInc0',
            'rrr.jpeg': 'GY4BgdUSpbE',
            'thor.jpeg': 'JOddp-nlNvQ',
            'tumbad.jpeg': 'YGIcZrUBY0k',
            'boss-baby.jpeg': 'tquIfapGVqs',
            'minions.jpeg': 'eisKxhjBnZ0',
            'loki.jpeg': 'nW948Va-l10',
            'jolly-llb.jpeg': 'eSgJ8PfSUSk',
            'chennai-express.jpeg': 'hZGR5Sj1Bfo',
            'jurasic-world.jpeg': 'RFinNxS5KN4',
            'lucky-bhaskar.jpeg': 'dQw4w9WgXcQ'
        };

        const movieFiles = Object.keys(trailerMap);

        function showHome(user) {
            document.getElementById('user-title').innerText = `Continue Watching for ${user}`;
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('home-screen').style.display = 'block';
        }

        function playTrailer(f) {
            const id = trailerMap[f] || 'dQw4w9WgXcQ';
            window.open(`https://www.youtube.com/watch?v=${id}`, "_blank");
        }

        function slide(id, d) {
            const el = document.getElementById(id);
            el.scrollBy({ left: (el.clientWidth * 0.7) * d, behavior: 'smooth' });
        }

        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

        function initRows() {
            const r1 = document.getElementById('row1');
            const r2 = document.getElementById('row2');
            const shuffled = shuffle([...movieFiles]);
            
            // Balanced slicing for the remaining movies
            const split = Math.floor(shuffled.length / 2);
            shuffled.slice(0, split).forEach(f => r1.appendChild(createP(f)));
            shuffled.slice(split).forEach(f => r2.appendChild(createP(f)));
        }

        function createP(f) {
            const img = document.createElement('img');
            img.src = `posters/${f}`;
            img.className = 'poster';
            img.onclick = () => playTrailer(f);
            return img;
        }

        initRows();
    </script>
</body>
</html>
